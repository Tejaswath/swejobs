name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "extension/**"
      - ".github/workflows/frontend-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "extension/vite.config.ts"
      - "tsconfig*.json"
      - "eslint.config.js"
      - "scripts/verify-extension-build.mjs"

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build extension
        run: npm run build:extension

      - name: Test
        run: npm run test

      - name: Build SPA
        run: npm run build

      - name: Verify extension bundles
        run: node scripts/verify-extension-build.mjs
