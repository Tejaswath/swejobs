<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SweJobs Capture</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>SweJobs Capture</h1>
          <p>Save this role into Applications.</p>
        </div>
        <button id="toggle-config" class="btn-link header-action" type="button" aria-label="Toggle advanced config">
          ⚙
        </button>
      </header>

      <section class="panel hidden" id="config-section">
        <div class="panel-header">
          <h2>Connection</h2>
        </div>
        <p style="font-size: 11px; color: var(--text-secondary);">
          Connected to SweJobs. Configuration is automatic.
        </p>
        <p style="font-size: 11px; color: var(--success-text);">
          Status: <span id="config-status">OK</span>
        </p>
      </section>

      <section id="auth-section" class="panel hidden">
        <div class="panel-header">
          <h2>Sign in</h2>
        </div>
        <button id="sign-in-google" class="btn btn-primary">Sign in with Google</button>
        <p class="auth-separator">or use email and password</p>
        <label class="field">
          <span>Email</span>
          <input id="auth-email" type="email" autocomplete="email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="auth-password" type="password" autocomplete="current-password" />
        </label>
        <button id="sign-in" class="btn btn-outline">Sign in with password</button>
      </section>

      <section id="capture-section" class="panel hidden">
        <div class="panel-header split">
          <h2>Capture role</h2>
          <button id="sign-out" class="btn-link">Sign out</button>
        </div>
        <label class="field">
          <span>Company</span>
          <input id="company" type="text" />
        </label>
        <label class="field">
          <span>Job title</span>
          <input id="job-title" type="text" />
        </label>
        <label class="field">
          <span>Status</span>
          <select id="status">
            <option value="applied">Applied</option>
            <option value="oa">Online assessment</option>
            <option value="interviewing">Interviewing</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
            <option value="withdrawn">Withdrawn</option>
          </select>
        </label>
        <label class="field">
          <span>Job URL</span>
          <input id="job-url" type="url" />
        </label>
        <label class="field">
          <span>Notes (optional)</span>
          <textarea id="notes" rows="3" placeholder="Optional context for your tracker"></textarea>
        </label>
        <div id="recruiter-section" class="hidden" style="border-top: 1px solid var(--border); padding-top: 10px;">
          <div class="panel-header">
            <h2 id="recruiter-heading">Recruiter detected</h2>
          </div>
          <p id="recruiter-context" class="recruiter-context hidden"></p>
          <div style="display: flex; flex-direction: column; gap: 6px; margin-top: 6px;">
            <div style="display: flex; gap: 6px; font-size: 12px;">
              <span style="color: var(--text-secondary);">Name:</span>
              <span id="recruiter-name" style="color: var(--text-primary); font-weight: 500;"></span>
            </div>
            <div style="display: flex; gap: 6px; font-size: 12px;">
              <span style="color: var(--text-secondary);">Email:</span>
              <span id="recruiter-email" style="color: var(--text-primary);"></span>
            </div>
            <div style="display: flex; gap: 6px; font-size: 12px;">
              <span style="color: var(--text-secondary);">Title:</span>
              <span id="recruiter-title-display" style="color: var(--text-primary);"></span>
            </div>
            <div style="display: flex; gap: 6px; font-size: 12px;">
              <span style="color: var(--text-secondary);">LinkedIn:</span>
              <span id="recruiter-linkedin" style="color: var(--accent); font-size: 11px; word-break: break-all;"></span>
            </div>
          </div>
          <label
            class="recruiter-toggle"
            style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;"
          >
            <input
              type="checkbox"
              id="save-recruiter-toggle"
              style="accent-color: var(--accent); width: 14px; height: 14px;"
            />
            <span style="font-size: 11px; color: var(--text-secondary);">Also save recruiter to Outreach</span>
          </label>
          <p id="recruiter-status" class="hidden" style="font-size: 11px; margin-top: 4px;"></p>
        </div>
        <div class="row" style="grid-template-columns: auto 1fr; margin-top: 6px;">
          <button id="autofill" class="btn btn-outline" style="font-size: 11px;">Autofill from page</button>
          <button id="save-application" class="btn btn-primary">Save application</button>
        </div>
      </section>

      <p id="global-status" class="status hidden"></p>
    </main>

    <script type="module" src="./dist/popup.js"></script>
  </body>
</html>
